name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Type-check & test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npm run type-check

      - name: Unit tests
        run: npm test

  integration:
    name: Integration tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: imamzain_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      # migrate deploy (not db push): the baseline migration creates the
      # citext/pgcrypto/pg_trgm extensions the schema needs, and this doubles
      # as a check that the migration chain applies cleanly on a fresh DB.
      - name: Apply migrations to test database
        run: npm run prisma:deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/imamzain_test
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/imamzain_test

      - name: Integration tests
        run: npm run test:integration
        env:
          DATABASE_TEST_URL: postgresql://postgres:postgres@localhost:5432/imamzain_test
          JWT_SECRET: test-only-secret-not-for-production
          BCRYPT_ROUNDS: '4'